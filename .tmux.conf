set -g default-terminal "xterm-ghostty"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# also restore vim/nvim sessions and shell history
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# auto-save every 5 minutes, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# set history limit
set-option -g history-limit 50000

# start new window in same path
bind c new-window -c "#{pane_current_path}"

# rename window: stored in @wname and shown in the status bar instead of the
# auto dir/process name. Submit an empty name to clear it and return to auto.
bind , command-prompt -I "#{@wname}" -p "rename window:" "set -w @wname '%%'"

# faster command sequences
set -sg escape-time 10

# reload the config file with r
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# no confirmation before closing pane
bind x kill-pane

# count from 1 and reorder
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# mouse mode
set -g mouse on

# split windows using \ and -
bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# flip through windows with shift-left/right
bind -n S-Left previous-window
bind -n S-Right next-window

# status bar
set -g status on
set -g status-interval 10
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
#   \uf120 = terminal (nf-oct-terminal)
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] \uf120 #S #[bg=#1e1e2e,fg=#cdd6f4] "

# Right side: git | battery | clock | host
#   \uf126 = git branch
#   \uf241 = battery
#   \uf017 = clock
#   \uf233 = server (host)
set -g status-right-length 150
set -g status-right "\
#[bg=#a6e3a1,fg=#1e1e2e,bold] \uf126 #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo -) \
#[bg=#fab387,fg=#1e1e2e,bold] \uf241 #(pmset -g batt | grep -Eo '\\d+%%' | head -1) \
#[bg=#74c7ec,fg=#1e1e2e,bold] \uf017 %a %d %b \u00b7 wk %V \u00b7 %H:%M \
#[bg=#cba6f7,fg=#1e1e2e,bold] \uf233 #h "

# Windows
#   \uf02b = tag     (manual name set via prefix + ,)
#   \uf07b = folder  (idle shell -> show dir)
#   \uf085 = cogs    (running process -> show command)
#   \uf065 = magnify (zoom indicator)
set -g window-status-separator " "
set -g window-status-format "#[bg=#1e1e2e,fg=#6c7086] #I #{?#{==:#{@wname},},#{?#{==:#{pane_current_command},zsh},\uf07b #{b:pane_current_path},\uf085 #{pane_current_command}},\uf02b #{@wname}}#{?window_zoomed_flag, \uf065,} "
set -g window-status-current-format "#[bg=#fab387,fg=#1e1e2e,bold] #I #{?#{==:#{@wname},},#{?#{==:#{pane_current_command},zsh},\uf07b #{b:pane_current_path},\uf085 #{pane_current_command}},\uf02b #{@wname}}#{?window_zoomed_flag, \uf065,} "
set -g window-status-activity-style "fg=#f38ba8,bg=#1e1e2e"

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Messages
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Mode (copy mode, selection)
set -g mode-style "bg=#89b4fa,fg=#1e1e2e"

# Load TPM
run '~/.tmux/plugins/tpm/tpm'