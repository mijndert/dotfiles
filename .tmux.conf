# assume 256 color mode
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# also restore vim/nvim sessions and shell history
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# auto-save every 15 minutes, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# set history limit
set-option -g history-limit 50000

# start new window in same path
bind c new-window -c "#{pane_current_path}"

# Faster command sequences
set -sg escape-time 10

# reload the config file with r
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# no confirmation before closing pane
bind x kill-pane

# count from 1 and reorder
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Mouse mode
set -g mouse on

# split windows using | and -
bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# flip through windows with shift-left/right
bind -n S-Left previous-window
bind -n S-Right next-window

# Status bar
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#cdd6f4] "

# Right side: k8s context | git branch | battery | host
set -g status-right-length 120
set -g status-right "#[fg=#89b4fa,bold]⎈ #(kubectl config current-context 2>/dev/null || echo none) #[fg=#45475a]│ #[fg=#a6e3a1] #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo -) #[fg=#45475a]│ #[fg=#fab387] #(pmset -g batt | grep -Eo '\\d+%%' | head -1) #[fg=#45475a]│ #[fg=#cdd6f4]#h "

# Windows
set -g window-status-separator " "
set -g window-status-format "#[bg=#1e1e2e,fg=#6c7086] #I:#{b:pane_current_path} "
set -g window-status-current-format "#[bg=#fab387,fg=#1e1e2e,bold] #I:#{b:pane_current_path} "
set -g window-status-activity-style "fg=#f38ba8,bg=#1e1e2e"

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Messages
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Mode (copy mode, selection)
set -g mode-style "bg=#89b4fa,fg=#1e1e2e"

# Run RPM
run '~/.tmux/plugins/tpm/tpm'